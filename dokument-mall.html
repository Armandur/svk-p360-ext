<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>Dokumentmall – 360° Hjälptillägg</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }
    h2 {
      margin: 0 0 20px;
      font-size: 18px;
      color: #222;
    }
    .sektion {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .faltrad {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 3px;
      font-weight: 600;
    }
    input[type=text], select, textarea {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      background: #fafafa;
    }
    textarea { resize: vertical; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0078d4;
      background: #fff;
    }
    .tvakol {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .obligatorisk::after { content: ' *'; color: #c0392b; }

    /* Sekretessblock */
    #sekretess-falt {
      margin-top: 10px;
      padding: 12px;
      background: #fff8e8;
      border: 1px solid #f0d070;
      border-radius: 5px;
    }
    #sekretess-falt label { color: #6b4e10; }
    #sekretess-falt select, #sekretess-falt input { background: #fffdf5; }

    /* Knappar längst ner */
    .knappar-fast {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .knappar-fast button {
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      border: 1px solid #ccc;
      background: #f5f5f5;
    }
    .knappar-fast button.primär {
      background: #0078d4;
      color: #fff;
      border-color: #0078d4;
    }
    .knappar-fast button.primär:hover { background: #006cbf; }

    #varningsruta {
      display: none;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: #fff8e1;
      border: 1px solid #f9a825;
      border-radius: 5px;
      font-size: 13px;
      color: #6d4c00;
    }

    #felruta {
      display: none;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: #fdecea;
      border: 1px solid #e74c3c;
      border-radius: 5px;
      font-size: 13px;
      color: #922b21;
    }

    .cache-status {
      font-size: 12px;
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #f0f6ff;
      border: 1px solid #c2d8f5;
      border-radius: 4px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="sidrubrik">Ny dokumentmall</h2>
    <div id="felruta"></div>
    <div id="varningsruta"></div>

    <div class="cache-status">
      Fältalternativ hämtas från cache (klicka "Läs in" i en ärendemall för att uppdatera).
      <span id="cache-status-text" style="font-weight:600;"></span>
    </div>

    <div class="sektion">
      <div class="faltrad">
        <label class="obligatorisk" for="dok-namn">Mallnamn</label>
        <input type="text" id="dok-namn" placeholder="Ge dokumentmallen ett beskrivande namn">
      </div>

      <div class="faltrad">
        <label for="dok-titel">Dokumenttitel (förfyllning)</label>
        <input type="text" id="dok-titel" placeholder="Titeln som förfylls när mallen används">
      </div>

      <div class="tvakol">
        <div class="faltrad">
          <label for="dok-handlingstyp">Handlingstyp</label>
          <select id="dok-handlingstyp">
            <option value="">(Ingen)</option>
          </select>
        </div>
        <div class="faltrad">
          <label for="dok-kategori">Dokumentkategori</label>
          <select id="dok-kategori">
            <option value="">(Ingen)</option>
            <option value="110">Inkommande</option>
            <option value="111">Utgående</option>
            <option value="60005">Upprättat</option>
            <option value="112">Protokoll</option>
          </select>
        </div>
      </div>

      <div class="tvakol">
        <div class="faltrad">
          <label for="dok-skyddskod">Skyddskod</label>
          <select id="dok-skyddskod">
            <option value="0">Offentlig</option>
            <option value="100031">Sekretess KO</option>
            <option value="100032">Sekretess OSL</option>
          </select>
        </div>
        <div class="faltrad">
          <label for="dok-atkomstgrupp">Åtkomstgrupp</label>
          <select id="dok-atkomstgrupp">
            <option value="">(Ingen)</option>
          </select>
        </div>
      </div>

      <!-- Sekretessfält -->
      <div id="sekretess-falt" style="display:none;">
        <div class="tvakol">
          <div class="faltrad">
            <label class="obligatorisk" for="dok-paragraf">Paragraf</label>
            <select id="dok-paragraf">
              <option value="">– välj paragraf –</option>
            </select>
          </div>
          <div class="faltrad">
            <label for="dok-off-titel-val">Val av offentlig titel</label>
            <select id="dok-off-titel-val">
              <option value="1">Sätt offentlig titel lika med titel</option>
              <option value="2">Skydda hela offentliga titeln</option>
              <option value="3">Skriv in offentlig titel manuellt</option>
            </select>
          </div>
        </div>
        <div id="off-titel-falt" class="faltrad" style="display:none;">
          <label for="dok-off-titel">Offentlig titel</label>
          <input type="text" id="dok-off-titel">
        </div>
      </div>

      <div class="faltrad">
        <label for="dok-oregistrerad-kontakt" id="dok-kontakt-etikett">Oregistrerad kontakt (avsändare/mottagare)</label>
        <input type="text" id="dok-oregistrerad-kontakt" placeholder="Namn på oregistrerad kontakt">
      </div>

      <div class="tvakol">
        <div class="faltrad">
          <label for="dok-datum-typ" id="dok-datum-etikett">Datum</label>
          <select id="dok-datum-typ">
            <option value="">(Inget)</option>
            <option value="idag">Dagens datum</option>
            <option value="datum">Ange datum</option>
          </select>
          <input type="date" id="dok-datum-värde" style="display:none;margin-top:4px;">
        </div>
        <div class="faltrad">
          <label for="dok-ansvarig-enhet">Ansvarig enhet</label>
          <select id="dok-ansvarig-enhet">
            <option value="">(Ingen)</option>
          </select>
        </div>
      </div>

      <div class="tvakol">
        <div class="faltrad">
          <label for="dok-ansvarig-person">Ansvarig person</label>
          <select id="dok-ansvarig-person">
            <option value="">(Ingen)</option>
          </select>
        </div>
        <div class="faltrad">
          <label for="dok-projekt">Projekt</label>
          <select id="dok-projekt">
            <option value="">(Inget)</option>
          </select>
        </div>
      </div>

      <div class="tvakol">
        <div class="faltrad">
          <label for="dok-fastighet">Fastighet</label>
          <select id="dok-fastighet">
            <option value="">(Ingen)</option>
          </select>
        </div>
        <div class="faltrad"></div>
      </div>
    </div>
  </div>

  <div class="knappar-fast">
    <button id="btn-avbryt">Avbryt</button>
    <button id="btn-spara" class="primär">Spara dokumentmall</button>
  </div>

  <script src="dokument-mall.js"></script>
</body>
</html>
